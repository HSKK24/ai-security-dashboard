name: pipeline

on:
  schedule:
    - cron: "0 22 * * *" # JST 07:00
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run pipeline
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - run: npm run build
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore(data): update CVE dataset"
          git pull --rebase origin main
          git push
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: dist
      # GitHub Pages deploys occasionally fail platform-side with a generic
      # "Deployment failed, try again later." even though the artifact upload
      # and data commit succeeded. Retry once after a short backoff before
      # failing the run (a new deployment is created; the failed one is terminal).
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        continue-on-error: true
      - name: Wait before retrying Pages deployment
        if: steps.deployment.outcome == 'failure'
        run: sleep 60
      - name: Retry Pages deployment
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
